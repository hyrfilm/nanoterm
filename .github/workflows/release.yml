name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Read version from tag
        run: |
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "${RELEASE_VERSION}" ] || [ "${RELEASE_VERSION}" = "${GITHUB_REF_NAME}" ]; then
            echo "Invalid tag format: ${GITHUB_REF_NAME}. Expected v<semver>."
            exit 1
          fi
          echo "RELEASE_VERSION=${RELEASE_VERSION}" >> "$GITHUB_ENV"

      - name: Write release version into package.json
        run: npm version "$RELEASE_VERSION" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Build overlay
        run: npm run overlay:build

      - name: Run tests
        run: npm test

      - name: Run type checks
        run: npm run check

      - name: Build library
        run: npm run build:lib

      - name: Publish package
        run: npm publish --provenance --access public

      - name: Sync version files to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git checkout -B main origin/main

          npm version "$RELEASE_VERSION" --no-git-tag-version --allow-same-version

          if git diff --quiet package.json package-lock.json; then
            echo "No version drift to sync."
            exit 0
          fi

          git add package.json package-lock.json
          git commit -m "chore: sync package version to $RELEASE_VERSION"
          git push origin HEAD:main

  github-release:
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
